<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .card{width:700px;padding:36px 24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .row{display:flex;gap:28px;align-items:flex-start;justify-content:center}
  .btn{background:#FF6B00;color:#000;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.06em;padding:12px 20px;border:0;box-shadow:2px 2px 0 #000;cursor:pointer;line-height:1}
  .btn:hover{background:#ff7a1a}
  .btn.pressed{box-shadow:0 0 0 #000;transform:translate(1px,1px)}
  .btn.disabled{background:#2a2a2a;color:#555;box-shadow:none;cursor:not-allowed}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px}
  .meta{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.04em}
</style></head>
<body><div class="card">
<div class="row">
  <div class="item"><button class="btn">SHIP IT →</button><div class="meta">default</div></div>
  <div class="item"><button class="btn pressed">SHIP IT →</button><div class="meta">pressed</div></div>
  <div class="item"><button class="btn disabled">SHIP IT →</button><div class="meta">disabled</div></div>
</div>
</div></body></html>
