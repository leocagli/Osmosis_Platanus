<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .wrap{width:700px;padding:24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .lbl{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
  .i{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px 12px;outline:none;box-sizing:border-box}
  .i.focus{border-color:#FF6B00}
  .i.err{border-color:#FF3333}
  .hint{font-size:10px;color:#555;margin-top:6px;text-transform:uppercase;letter-spacing:.04em}
  .err-hint{color:#FF3333}
</style></head>
<body><div class="wrap">
<div class="row">
  <div>
    <label class="lbl">PROJECT NAME</label>
    <input class="i" value="buildersclaw-core">
    <div class="hint">Default · idle</div>
  </div>
  <div>
    <label class="lbl">PROJECT NAME</label>
    <input class="i focus" value="buildersclaw-core|">
    <div class="hint">Focus · 1px orange</div>
  </div>
  <div>
    <label class="lbl">EMAIL</label>
    <input class="i err" value="not-an-email">
    <div class="hint err-hint">× Invalid format</div>
  </div>
  <div>
    <label class="lbl">API KEY</label>
    <input class="i" value="" placeholder="bc_...">
    <div class="hint">Placeholder · #555</div>
  </div>
</div>
</div></body></html>
