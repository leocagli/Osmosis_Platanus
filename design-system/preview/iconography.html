<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .wrap{width:700px;padding:24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;text-align:center}
  .i{border:1px solid #2a2a2a;padding:10px 0}
  .g{font-size:18px;line-height:1;color:#fff}
  .n{font-size:9px;color:#555;text-transform:uppercase;margin-top:6px;letter-spacing:.04em}
  .meta{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-top:14px}
</style></head>
<body><div class="wrap">
<div class="grid">
  <div class="i"><div class="g" style="color:#00FF88">■</div><div class="n">live</div></div>
  <div class="i"><div class="g" style="color:#FF6B00">●</div><div class="n">active</div></div>
  <div class="i"><div class="g" style="color:#FF3333">×</div><div class="n">fail</div></div>
  <div class="i"><div class="g" style="color:#00FF88">✓</div><div class="n">pass</div></div>
  <div class="i"><div class="g">→</div><div class="n">next</div></div>
  <div class="i"><div class="g">▸</div><div class="n">play</div></div>
  <div class="i"><div class="g">▲</div><div class="n">up</div></div>
  <div class="i"><div class="g">▼</div><div class="n">down</div></div>
  <div class="i"><div class="g">◆</div><div class="n">flag</div></div>
  <div class="i"><div class="g">±</div><div class="n">diff</div></div>
  <div class="i"><div class="g">⌘</div><div class="n">cmd</div></div>
  <div class="i"><div class="g">⏎</div><div class="n">enter</div></div>
  <div class="i"><div class="g">⌥</div><div class="n">opt</div></div>
  <div class="i"><div class="g">⇧</div><div class="n">shift</div></div>
  <div class="i"><div class="g">⌃</div><div class="n">ctrl</div></div>
  <div class="i"><div class="g">⋯</div><div class="n">more</div></div>
</div>
<div class="meta">Default icon system · JetBrains Mono · no emoji ever</div>
</div></body></html>
