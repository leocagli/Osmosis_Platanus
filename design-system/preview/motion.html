<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .wrap{width:700px;padding:28px 24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .row{display:flex;align-items:center;gap:28px;justify-content:center}
  .btn{background:#FF6B00;color:#000;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.06em;padding:12px 20px;border:0;line-height:1}
  .rest{box-shadow:2px 2px 0 #000}
  .press{box-shadow:0 0 0 #000;transform:translate(1px,1px)}
  .arrow{color:#555;font-size:18px}
  .meta{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.04em;text-align:center;margin-top:18px}
  .rule{font-size:11px;color:#aaa;text-align:center;margin-top:6px}
</style></head>
<body><div class="wrap">
<div class="row">
  <button class="btn rest">SHIP IT</button>
  <span class="arrow">→</span>
  <button class="btn press">SHIP IT</button>
</div>
<div class="meta">Rest → Press · translate(1px, 1px) · shadow collapses</div>
<div class="rule">100ms linear max · no fades · no bounces · no blur · no parallax</div>
</div></body></html>
