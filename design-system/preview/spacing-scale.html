<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .card{width:700px;padding:24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:8px;font-size:11px}
  .bar{background:#FF6B00;height:14px}
  .tag{color:#aaa;width:80px;text-transform:uppercase}
  .val{color:#fff;width:60px}
</style></head>
<body><div class="card">
<div class="row"><span class="tag">s-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
<div class="row"><span class="tag">s-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
<div class="row"><span class="tag">s-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
<div class="row"><span class="tag">s-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
<div class="row"><span class="tag">s-6</span><div class="bar" style="width:24px"></div><span class="val">24px · card padding</span></div>
<div class="row"><span class="tag">s-8</span><div class="bar" style="width:32px"></div><span class="val">32px · section min</span></div>
<div class="row"><span class="tag">s-12</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
<div class="row"><span class="tag">s-16</span><div class="bar" style="width:64px"></div><span class="val">64px · section max</span></div>
</div></body></html>
