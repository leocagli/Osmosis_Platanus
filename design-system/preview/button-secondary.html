<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .card{width:700px;padding:36px 24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .row{display:flex;gap:28px;align-items:flex-start;justify-content:center}
  .btn{background:transparent;color:#fff;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.06em;padding:11px 19px;border:1px solid #3a3a3a;cursor:pointer;line-height:1}
  .btn:hover{border-color:#fff;background:#1a1a1a}
  .btn.pressed{transform:translate(1px,1px)}
  .btn.disabled{color:#555;border-color:#2a2a2a;cursor:not-allowed}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px}
  .meta{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.04em}
</style></head>
<body><div class="card">
<div class="row">
  <div class="item"><button class="btn">DOCS</button><div class="meta">default</div></div>
  <div class="item"><button class="btn" style="border-color:#fff;background:#1a1a1a">DOCS</button><div class="meta">hover</div></div>
  <div class="item"><button class="btn disabled">DOCS</button><div class="meta">disabled</div></div>
</div>
</div></body></html>
