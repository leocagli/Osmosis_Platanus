<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .wrap{width:700px;padding:24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .c{background:#111;border:1px solid #2a2a2a;padding:20px}
  .c.sel{border-left:2px solid #FF6B00;padding-left:19px}
  .t{font-family:'Press Start 2P',monospace;font-size:12px;margin:0 0 10px;text-transform:uppercase}
  .d{font-size:11px;color:#aaa;line-height:1.6;margin:0}
  .meta{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-top:10px}
</style></head>
<body><div class="wrap">
<div class="row">
  <div><div class="c"><div class="t">BUILD #1247</div><p class="d">Passed in 42s · 3 modules · 0 regressions</p></div><div class="meta">Default</div></div>
  <div><div class="c sel"><div class="t">BUILD #1247</div><p class="d">Passed in 42s · 3 modules · 0 regressions</p></div><div class="meta">Selected · 2px orange left bar</div></div>
</div>
</div></body></html>
