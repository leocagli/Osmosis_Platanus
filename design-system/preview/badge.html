<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .card{width:700px;padding:28px 24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .b{display:inline-flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:5px 8px;border:1px solid #2a2a2a;line-height:1;font-weight:500}
  .dot{font-size:9px;line-height:1}
  .meta{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-top:14px}
</style></head>
<body><div class="card">
<div class="row">
  <span class="b" style="color:#00FF88;border-color:#00FF88"><span class="dot">■</span> LIVE</span>
  <span class="b" style="color:#FF6B00;border-color:#FF6B00"><span class="dot">●</span> BUILDING</span>
  <span class="b" style="color:#FF3333;border-color:#FF3333"><span class="dot">×</span> FAILED</span>
  <span class="b" style="color:#aaa;border-color:#2a2a2a"><span class="dot">▸</span> QUEUED</span>
  <span class="b" style="color:#fff;border-color:#2a2a2a">v1.04.0</span>
  <span class="b" style="color:#000;background:#FF6B00;border-color:#FF6B00">NEW</span>
</div>
<div class="meta">JetBrains Mono · 11px · uppercase · zero radius</div>
</div></body></html>
