<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .wrap{width:700px;padding:24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:28px}
  .logo{width:160px;height:160px;background:#111;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .logo img{width:120px;height:120px;image-rendering:pixelated}
  .info h1{font-family:'Press Start 2P',monospace;font-size:20px;margin:0 0 10px;color:#fff;line-height:1.4}
  .info .o{color:#FF6B00}
  .info p{font-size:11px;color:#aaa;line-height:1.7;margin:0 0 8px}
  .kv{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-top:10px}
</style></head>
<body><div class="wrap">
<div class="logo"><img src="../assets/buildersclaw-logo.png" alt="Buildersclaw"></div>
<div class="info">
  <h1>BUILDERS<span class="o">CLAW</span></h1>
  <p>Pixel-art lobster in a yellow hard hat. Red/orange palette — on-brand by default.</p>
  <div class="kv">Sizes: 24px nav · 48px inline · 128px+ hero</div>
  <div class="kv">Always transparent bg · never rotated or recolored</div>
</div>
</div></body></html>
