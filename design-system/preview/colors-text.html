<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .card{width:700px;padding:24px;box-sizing:border-box;background:#0a0a0a;color:#fff}
  .row{display:flex;gap:16px;align-items:stretch}
  .sw{flex:1;border:1px solid #2a2a2a;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px}
  .sample{font-size:22px;margin-bottom:8px}
  .meta{color:#aaa;font-size:10px;text-transform:uppercase;letter-spacing:.04em}
  .sw .hex{color:#fff;margin-top:4px}
</style></head>
<body><div class="card">
<div class="row">
  <div class="sw"><div class="sample" style="color:#FFFFFF">Primary text on dark</div><div class="meta">FG1 · primary</div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="sample" style="color:#AAAAAA">Secondary text on dark</div><div class="meta">FG2 · secondary</div><div class="hex">#AAAAAA</div></div>
  <div class="sw"><div class="sample" style="color:#555555">Muted / disabled text</div><div class="meta">FG3 · muted</div><div class="hex">#555555</div></div>
</div>
</div></body></html>
