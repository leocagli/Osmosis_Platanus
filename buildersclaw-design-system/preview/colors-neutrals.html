<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .card{width:700px;padding:24px;box-sizing:border-box;background:#0a0a0a}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .sw{height:96px;border:1px solid #2a2a2a;padding:10px;display:flex;flex-direction:column;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px}
  .sw .n{text-transform:uppercase;font-weight:700;color:#fff}
  .sw .h{color:rgba(255,255,255,.7)}
</style></head>
<body><div class="card">
<div class="row">
  <div class="sw" style="background:#0a0a0a"><span class="n" style="color:#fff">BG</span><span class="h" style="color:#aaa">#0A0A0A</span></div>
  <div class="sw" style="background:#111111"><span class="n" style="color:#fff">SURFACE</span><span class="h" style="color:#aaa">#111111</span></div>
  <div class="sw" style="background:#1a1a1a"><span class="n" style="color:#fff">SURFACE-2</span><span class="h" style="color:#aaa">#1A1A1A</span></div>
  <div class="sw" style="background:#2a2a2a"><span class="n" style="color:#fff">BORDER</span><span class="h" style="color:#aaa">#2A2A2A</span></div>
  <div class="sw" style="background:#3a3a3a"><span class="n" style="color:#fff">BORDER+</span><span class="h" style="color:#ccc">#3A3A3A</span></div>
  <div class="sw" style="background:#555555"><span class="n" style="color:#fff">FG3 / MUTED</span><span class="h" style="color:#ddd">#555555</span></div>
</div>
</div></body></html>
