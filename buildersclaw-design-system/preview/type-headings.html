<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .card{width:700px;padding:28px;box-sizing:border-box;background:#0a0a0a;color:#fff}
  .row{display:flex;flex-direction:column;gap:18px}
  .h1{font-family:'Press Start 2P',monospace;font-size:24px;line-height:1.4;color:#fff;margin:0}
  .h2{font-family:'Press Start 2P',monospace;font-size:16px;line-height:1.4;color:#fff;margin:0}
  .h3{font-family:'Press Start 2P',monospace;font-size:12px;line-height:1.4;color:#fff;margin:0;text-transform:uppercase}
  .meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
</style></head>
<body><div class="card">
<div class="row">
  <div><div class="h1">BUILD. SHIP. REPEAT.</div><div class="meta">h1 · Press Start 2P · 24 / 1.4</div></div>
  <div><div class="h2">Section header</div><div class="meta">h2 · Press Start 2P · 16 / 1.4</div></div>
  <div><div class="h3">CARD LABEL</div><div class="meta">h3 · Press Start 2P · 12 · UPPERCASE · never below 11px</div></div>
</div>
</div></body></html>
