<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .card{width:700px;padding:28px 24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:center}
  .box{height:96px;border:1px solid #3a3a3a;display:flex;align-items:center;justify-content:center;font-size:11px;text-transform:uppercase}
  .yes{background:#111;color:#fff}
  .no{background:#111;color:#FF3333;border-color:#FF3333;border-radius:12px;position:relative}
  .no::after{content:"×";position:absolute;top:6px;right:10px;color:#FF3333;font-size:18px}
  .meta{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-top:8px;text-align:center}
  .ok{color:#00FF88}
</style></head>
<body><div class="card">
<div class="row">
  <div><div class="box yes">RADIUS: 0</div><div class="meta ok">■ ALWAYS</div></div>
  <div><div class="box no">RADIUS > 0</div><div class="meta" style="color:#FF3333">× NEVER</div></div>
</div>
<div style="height:14px"></div>
<div style="font-size:11px;color:#aaa;text-align:center">Rounded corners are the single fastest way to violate the brand.</div>
</div></body></html>
