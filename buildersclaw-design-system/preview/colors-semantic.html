<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .card{width:700px;padding:24px;box-sizing:border-box;background:#0a0a0a}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .row + .row{margin-top:8px}
  .sw{height:86px;border:1px solid #2a2a2a;padding:10px;display:flex;flex-direction:column;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px}
  .sw .n{text-transform:uppercase;font-weight:700;letter-spacing:.04em}
  .sw .r{font-size:9px;opacity:.75;margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
  .sw .h{opacity:.8;font-size:10px}
</style></head>
<body><div class="card">

<!-- Primary brand row -->
<div class="row">
  <div class="sw" style="background:#FF6B00;color:#000">
    <div><div class="n">PRIMARY</div><div class="r">cta · brand</div></div>
    <span class="h">#FF6B00</span>
  </div>
  <div class="sw" style="background:#00FF88;color:#000">
    <div><div class="n">LIVE</div><div class="r">success · status</div></div>
    <span class="h">#00FF88</span>
  </div>
  <div class="sw" style="background:#FF3333;color:#000">
    <div><div class="n">DANGER</div><div class="r">destructive</div></div>
    <span class="h">#FF3333</span>
  </div>
  <div class="sw" style="background:#FFD700;color:#000">
    <div><div class="n">WARN</div><div class="r">hard hat · caution</div></div>
    <span class="h">#FFD700</span>
  </div>
</div>

<!-- Extended 8bit row -->
<div class="row">
  <div class="sw" style="background:#00D9FF;color:#000">
    <div><div class="n">INFO</div><div class="r">link · notice</div></div>
    <span class="h">#00D9FF</span>
  </div>
  <div class="sw" style="background:#B967FF;color:#000">
    <div><div class="n">ACCENT</div><div class="r">tag · highlight</div></div>
    <span class="h">#B967FF</span>
  </div>
  <div class="sw" style="background:#FF2E88;color:#000">
    <div><div class="n">HOT</div><div class="r">trending · new</div></div>
    <span class="h">#FF2E88</span>
  </div>
  <div class="sw" style="background:#7CFC00;color:#000">
    <div><div class="n">QUEST</div><div class="r">xp · reward</div></div>
    <span class="h">#7CFC00</span>
  </div>
</div>

</div></body></html>
