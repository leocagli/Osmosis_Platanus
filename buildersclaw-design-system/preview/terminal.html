<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .wrap{width:700px;padding:24px;box-sizing:border-box;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .term{background:#111;border:1px solid #2a2a2a}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #2a2a2a;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#aaa}
  .dots{display:flex;gap:6px}
  .dot{width:8px;height:8px;background:#2a2a2a}
  .bd{padding:14px;font-size:12px;line-height:1.7}
  .p{color:#FF6B00}
  .mut{color:#555}
  .ok{color:#00FF88}
  .fg{color:#fff}
</style></head>
<body><div class="wrap">
<div class="term">
  <div class="hd">
    <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <span>~/buildersclaw — bash</span>
    <span>42×12</span>
  </div>
  <div class="bd">
    <div><span class="p">$</span> <span class="fg">npm install @buildersclaw/core</span></div>
    <div class="mut">  added 42 packages in 3.2s</div>
    <div><span class="p">$</span> <span class="fg">bc build</span></div>
    <div class="mut">  compiling 12 modules...</div>
    <div><span class="ok">■</span> <span class="fg">build passed</span> <span class="mut">in 42s</span></div>
  </div>
</div>
</div></body></html>
