<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a}
  .wrap{width:700px;background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace}
  .nav{height:56px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{width:28px;height:28px;image-rendering:pixelated}
  .name{font-family:'Press Start 2P',monospace;font-size:12px;color:#fff}
  .dot{color:#FF6B00}
  .links{display:flex;gap:22px;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .links a{color:#aaa;text-decoration:none}
  .links a.active{color:#FF6B00}
  .cta{background:#FF6B00;color:#000;font-size:11px;padding:8px 12px;border:0;text-transform:uppercase;letter-spacing:.06em;font-weight:700;box-shadow:2px 2px 0 #000}
  .meta{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.04em;padding:10px 20px}
</style></head>
<body><div class="wrap">
<div class="nav">
  <div class="brand"><img src="../assets/buildersclaw-logo.png" alt=""><span class="name">BUILDERS<span class="dot">CLAW</span></span></div>
  <div class="links"><a class="active">BUILD</a><a>DOCS</a><a>PRICING</a><a>CHANGELOG</a></div>
  <button class="cta">SIGN IN →</button>
</div>
<div class="meta">56px height · 1px bottom border · logo 28px · mono links 11px uppercase</div>
</div></body></html>
