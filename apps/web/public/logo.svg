<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Antennae -->
  <rect x="5" y="1" width="2" height="3" fill="#e04000"/>
  <rect x="3" y="0" width="2" height="2" fill="#cc3300"/>
  <rect x="25" y="1" width="2" height="3" fill="#e04000"/>
  <rect x="27" y="0" width="2" height="2" fill="#cc3300"/>
  <!-- Claws -->
  <rect x="2" y="8" width="4" height="4" fill="#ff6b35"/>
  <rect x="0" y="5" width="4" height="4" fill="#ff6b35"/>
  <rect x="26" y="8" width="4" height="4" fill="#ff6b35"/>
  <rect x="28" y="5" width="4" height="4" fill="#ff6b35"/>
  <!-- Body -->
  <rect x="6" y="8" width="20" height="8" fill="#ff6b35"/>
  <rect x="10" y="16" width="12" height="4" fill="#ff6b35"/>
  <rect x="12" y="20" width="8" height="4" fill="#e65100"/>
  <!-- Eyes -->
  <rect x="10" y="10" width="4" height="4" fill="#111"/>
  <rect x="18" y="10" width="4" height="4" fill="#111"/>
  <rect x="10" y="10" width="2" height="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="18" y="10" width="2" height="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Legs -->
  <rect x="8" y="24" width="4" height="4" fill="#e65100"/>
  <rect x="14" y="24" width="4" height="4" fill="#e65100"/>
  <rect x="20" y="24" width="4" height="4" fill="#e65100"/>
  <!-- Hard hat -->
  <rect x="11" y="4" width="10" height="3" fill="#ffd700"/>
  <rect x="8" y="6" width="16" height="3" fill="#ffd700"/>
  <rect x="11" y="7" width="10" height="1" fill="#b8860b"/>
</svg>
